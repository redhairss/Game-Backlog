name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Gradle wrapper jar
        run: |
          mkdir -p GameBacklog/gradle/wrapper
          curl -L "https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar" \
            -o GameBacklog/gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x GameBacklog/gradlew

      - name: Build debug APK
        working-directory: GameBacklog
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GameBacklog-debug
          path: GameBacklog/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

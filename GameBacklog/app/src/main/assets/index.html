<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RedHairss — Game Backlog Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --surface2: #f1efe8;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --text: #1a1a18;
    --text2: #5f5e5a;
    --text3: #8f8e8a;
    --radius: 8px;
    --radius-lg: 12px;
    --accent: #378ADD;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #181816;
      --surface: #222220;
      --surface2: #2c2c2a;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2);
      --text: #f0ede6;
      --text2: #a0a09a;
      --text3: #666660;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  header {
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .logo {
    width: 32px; height: 32px;
    background: #1b2838;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo svg { width: 20px; height: 20px; fill: white; }

  header h1 { font-size: 16px; font-weight: 500; color: var(--text); }
  header p { font-size: 12px; color: var(--text3); }

  .header-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }

  .btn-add {
    font-size: 12px; padding: 6px 12px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    font-family: inherit;
  }
  .btn-add:hover { background: var(--surface2); }

  .main { max-width: 960px; margin: 0 auto; padding: 20px 16px; }

  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap: 8px;
    margin-bottom: 16px;
  }
  .stat {
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 10px 14px;
  }
  .stat-label { font-size: 11px; color: var(--text2); margin-bottom: 3px; }
  .stat-val { font-size: 20px; font-weight: 500; }

  .controls {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 10px; align-items: center;
  }
  .search-wrap { flex: 1; min-width: 180px; position: relative; }
  .search-wrap svg { position:absolute; left:10px; top:50%; transform:translateY(-50%); width:14px; height:14px; fill:none; stroke:var(--text3); stroke-width:2; }
  input[type="text"] {
    width: 100%; padding: 8px 10px 8px 32px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
  }
  input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(55,138,221,0.15); }

  select {
    padding: 8px 10px; font-size: 12px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    font-family: inherit;
    cursor: pointer;
    outline: none;
  }

  .filter-row {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-bottom: 12px; align-items: center;
  }
  .fbtn {
    font-size: 11px; padding: 5px 11px;
    border-radius: 99px; cursor: pointer;
    border: 0.5px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    font-family: inherit;
    transition: all 0.1s;
  }
  .fbtn:hover { border-color: var(--border2); color: var(--text); }
  .fbtn.active { background: var(--surface2); color: var(--text); border-color: var(--border2); font-weight: 500; }
  .count-lbl { font-size: 11px; color: var(--text3); margin-left: auto; }

  .game-list { display: flex; flex-direction: column; gap: 4px; }

  .gc {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 12px;
    display: flex; align-items: center; gap: 10px;
    transition: border-color 0.1s;
  }
  .gc:hover { border-color: var(--border2); }
  .gc.is-new { border-color: var(--accent); }

  .bar-bg { width: 56px; height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; flex-shrink: 0; }
  .bar-fill { height: 100%; border-radius: 2px; }

  .gname {
    font-size: 13px; font-weight: 500; color: var(--text);
    flex: 1; min-width: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .tag-new {
    font-size: 9px; background: #E6F1FB; color: #185FA5;
    padding: 1px 5px; border-radius: 99px; margin-left: 5px;
    font-weight: 500; vertical-align: middle; flex-shrink: 0;
  }
  .ghrs { font-size: 11px; color: var(--text2); white-space: nowrap; min-width: 34px; text-align: right; flex-shrink: 0; }

  .sbadge {
    font-size: 10px; padding: 3px 9px;
    border-radius: 99px; cursor: pointer;
    white-space: nowrap; font-weight: 500;
    border: none; flex-shrink: 0;
    font-family: inherit;
    transition: opacity 0.1s;
  }
  .sbadge:hover { opacity: 0.8; }
  .s-unplayed  { background: #F1EFE8; color: #5F5E5A; }
  .s-backlog   { background: #E6F1FB; color: #0C447C; }
  .s-playing   { background: #EAF3DE; color: #3B6D11; }
  .s-completed { background: #EEEDFE; color: #3C3489; }
  .s-dropped   { background: #FCEBEB; color: #A32D2D; }
  .s-shelved   { background: #FAEEDA; color: #854F0B; }

  .page-row {
    display: flex; gap: 6px; align-items: center;
    justify-content: center; margin-top: 16px; flex-wrap: wrap;
  }
  .pbtn {
    font-size: 12px; padding: 5px 11px;
    border-radius: var(--radius); cursor: pointer;
    border: 0.5px solid var(--border);
    background: var(--surface); color: var(--text);
    font-family: inherit;
  }
  .pbtn:disabled { opacity: 0.35; cursor: default; }
  .pbtn.active { background: var(--surface2); font-weight: 500; border-color: var(--border2); }
  .page-info { font-size: 11px; color: var(--text2); }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 100; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--border2);
    padding: 20px 24px;
    width: 360px; max-width: 90vw;
  }
  .modal h2 { font-size: 15px; font-weight: 500; margin-bottom: 14px; }
  .modal label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 4px; }
  .modal input[type="text"], .modal input[type="number"] { padding: 8px 10px; margin-bottom: 12px; }
  .modal input[type="number"] { width: 100%; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--surface); color: var(--text); font-size: 13px; font-family: inherit; outline: none; }
  .modal input[type="number"]:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(55,138,221,0.15); }
  .modal select { width: 100%; margin-bottom: 16px; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-cancel { padding: 7px 14px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--surface); color: var(--text); cursor: pointer; font-family: inherit; font-size: 13px; }
  .btn-save { padding: 7px 14px; border-radius: var(--radius); border: none; background: var(--accent); color: white; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 500; }

  footer {
    text-align: center; padding: 20px;
    font-size: 11px; color: var(--text3);
    border-top: 0.5px solid var(--border);
    margin-top: 24px;
  }
</style>
</head>

<header>

    </svg>
  </div>
  <div>
    <h1>Game Backlog Tracker</h1>
    <p id="header-sub">RedHairss · Steam Library</p>
  </div>
  <div class="header-right">
    <button class="btn-add" onclick="openAddModal()">+ Add game</button>
    <button class="btn-add" onclick="exportCSV()">Export CSV</button>
  </div>
</header>

<div class="main">
  <div class="stats" id="stats"></div>
  <div class="controls">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="Search games…" id="search" />
    </div>
    <select id="sort">
      <option value="hours-desc">Most played</option>
      <option value="hours-asc">Least played</option>
      <option value="name-asc">A → Z</option>
      <option value="name-desc">Z → A</option>
    </select>
  </div>
  <div class="filter-row" id="filter-row"></div>
  <div class="game-list" id="game-list"></div>
  <div class="page-row" id="page-row"></div>
</div>

<footer>Statuses are saved automatically in your browser · <span id="game-count"></span> games tracked</footer>

<!-- Add Game Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Add a game</h2>
    <label>Game name</label>
    <input type="text" id="new-name" placeholder="e.g. Elden Ring" style="width:100%" />
    <div style="display:flex;gap:10px;">
      <div style="flex:1">
        <label>Hours played</label>
        <input type="number" id="new-hours" placeholder="0" min="0" step="0.1" style="width:100%;margin-bottom:12px" />
      </div>
    </div>
    <label>Status</label>
    <select id="new-status">
      <option value="unplayed">Unplayed</option>
      <option value="backlog">Backlog</option>
      <option value="playing" selected>Playing</option>
      <option value="completed">Completed</option>
      <option value="dropped">Dropped</option>
      <option value="shelved">Shelved</option>
    </select>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="addGame()">Add game</button>
    </div>
  </div>
</div>

// Load from localStorage or use defaults
function loadData() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return GAMES_DEFAULT.map(([name, hours, status, isNew]) => ({ name, hours: hours||0, status: status||'unplayed', isNew: !!isNew }));
}

function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

let data = loadData();
const maxHours = Math.max(...data.map(g=>g.hours), 1);
let filterStatus = 'all';
let currentPage = 1;

function cycle(name) {
  const g = data.find(x=>x.name===name);
  if (!g) return;
  g.status = STATUSES[(STATUSES.indexOf(g.status)+1) % STATUSES.length];
  saveData(); render();
}

function getFiltered() {
  let list = [...data];
  const q = document.getElementById('search').value.toLowerCase();
  if (q) list = list.filter(g => g.name.toLowerCase().includes(q));
  if (filterStatus !== 'all') list = list.filter(g => g.status === filterStatus);
  const sort = document.getElementById('sort').value;
  if (sort==='hours-desc') list.sort((a,b)=>b.hours-a.hours);
  else if (sort==='hours-asc') list.sort((a,b)=>a.hours-b.hours);
  else if (sort==='name-asc') list.sort((a,b)=>a.name.localeCompare(b.name));
  else list.sort((a,b)=>b.name.localeCompare(a.name));
  return list;
}

function barColor(h) {
  if (h>=50) return '#1D9E75'; if (h>=10) return '#378ADD'; if (h>=1) return '#BA7517'; return '#B4B2A9';
}

function fmtHours(h) {
  if (!h || h===0) return '—';
  if (h < 1) return Math.round(h*60)+'m';
  return (h >= 10 ? Math.round(h) : h.toFixed(1)) + 'h';
}

function render() {
  const list = getFiltered();
  const total = list.length;
  const pages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (currentPage > pages) currentPage = 1;

  const counts = {};
  STATUSES.forEach(s => counts[s] = 0);
  data.forEach(g => counts[g.status]++);
  const totalH = data.reduce((a,g) => a+g.hours, 0);

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-label">Total games</div><div class="stat-val">${data.length.toLocaleString()}</div></div>
    <div class="stat"><div class="stat-label">Hours played</div><div class="stat-val">${Math.round(totalH).toLocaleString()}</div></div>
    <div class="stat"><div class="stat-label">Playing</div><div class="stat-val">${counts.playing}</div></div>
    <div class="stat"><div class="stat-label">Shelved</div><div class="stat-val">${counts.shelved}</div></div>
    <div class="stat"><div class="stat-label">Completed</div><div class="stat-val">${counts.completed}</div></div>
    <div class="stat"><div class="stat-label">Dropped</div><div class="stat-val">${counts.dropped}</div></div>
    <div class="stat"><div class="stat-label">Unplayed</div><div class="stat-val">${counts.unplayed}</div></div>`;

  document.getElementById('filter-row').innerHTML =
    ['all',...STATUSES].map(s =>
      `<button class="fbtn${filterStatus===s?' active':''}" data-f="${s}">${s==='all'?`All (${data.length})`:S_LABELS[s]+' ('+counts[s]+')'}</button>`
    ).join('') + `<span class="count-lbl">${total} shown</span>`;

  document.querySelectorAll('.fbtn').forEach(b => b.addEventListener('click', () => {
    filterStatus = b.dataset.f; currentPage = 1; render();
  }));

  const start = (currentPage-1)*PAGE_SIZE;
  const page = list.slice(start, start+PAGE_SIZE);

  document.getElementById('game-list').innerHTML = page.map(g => {
    const safe = g.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
    return `<div class="gc${g.isNew?' is-new':''}">
      <div class="bar-bg"><div class="bar-fill" style="width:${Math.max(1,Math.round(g.hours/maxHours*100))}%;background:${barColor(g.hours)}"></div></div>
      <div class="gname" title="${safe}">${g.name}${g.isNew?'<span class="tag-new">custom</span>':''}</div>
      <span class="ghrs" title="Click to edit hours" style="cursor:pointer;text-decoration:underline dotted;text-underline-offset:2px;" onclick="editHours('${safe}')">${fmtHours(g.hours)}</span>
      <button class="sbadge s-${g.status}" onclick="cycle('${safe}')" title="Click to cycle status">${S_LABELS[g.status]}</button>
    </div>`;
  }).join('');

  document.getElementById('game-count').textContent = data.length.toLocaleString();

  const pr = document.getElementById('page-row');
  if (pages <= 1) { pr.innerHTML = ''; return; }
  let btns = `<button class="pbtn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹ Prev</button>`;
  const range = [];
  for (let i=1; i<=pages; i++) {
    if (i===1||i===pages||Math.abs(i-currentPage)<=2) range.push(i);
    else if (range[range.length-1]!=='…') range.push('…');
  }
  range.forEach(p => {
    if (p==='…') btns += `<span class="page-info" style="padding:0 4px">…</span>`;
    else btns += `<button class="pbtn${p===currentPage?' active':''}" onclick="goPage(${p})">${p}</button>`;
  });
  btns += `<button class="pbtn" onclick="goPage(${currentPage+1})" ${currentPage===pages?'disabled':''}>Next ›</button>`;
  btns += `<span class="page-info" style="margin-left:8px">${start+1}–${Math.min(start+PAGE_SIZE,total)} of ${total}</span>`;
  pr.innerHTML = btns;
}

window.goPage = function(p) { currentPage = p; window.scrollTo(0,0); render(); };
window.cycle = cycle;

function openAddModal() {
  document.getElementById('new-name').value = '';
  document.getElementById('new-hours').value = '';
  document.getElementById('new-status').value = 'playing';
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('new-name').focus(), 50);
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
window.openAddModal = openAddModal;
window.closeModal = closeModal;

window.editHours = function(name) {
  const g = data.find(x => x.name === name);
  if (!g) return;
  const current = g.hours || 0;
  const input = prompt(`Update hours played for "${g.name}":`, current);
  if (input === null) return;
  const val = parseFloat(input);
  if (isNaN(val) || val < 0) { alert('Please enter a valid number of hours.'); return; }
  g.hours = val;
  saveData(); render();
};

window.addGame = function() {
  const name = document.getElementById('new-name').value.trim();
  if (!name) return;
  const hours = parseFloat(document.getElementById('new-hours').value) || 0;
  const status = document.getElementById('new-status').value;
  if (data.find(g => g.name.toLowerCase() === name.toLowerCase())) {
    alert('A game with that name already exists!'); return;
  }
  data.unshift({ name, hours, status, isNew: true });
  saveData(); closeModal(); currentPage = 1; render();
};

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

window.exportCSV = function() {
  const header = 'Name,Hours,Status\n';
  const rows = [...data].sort((a,b)=>a.name.localeCompare(b.name))
    .map(g => `"${g.name.replace(/"/g,'""')}",${g.hours},${g.status}`).join('\n');
  const blob = new Blob([header+rows], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'game_backlog.csv';
  a.click();
};

document.getElementById('search').addEventListener('input', () => { currentPage=1; render(); });
document.getElementById('sort').addEventListener('change', () => { currentPage=1; render(); });

render();
</script>
